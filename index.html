<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光盘行动小游戏</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            width: 100%;
            height: 100%;
            text-align: center;
        }
        h2{
            margin: 30px auto;
        }
        span{
            color: rgb(175, 13, 13);
        }
        ul{
            list-style-type: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        ul li{
            padding: 20px;
        }
        ul li img{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 1px solid #ccc;
            box-shadow: 1px 1px 5px 1px #ccc;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>请点击图片中的 <span></span></h2>
    <ul>
        <li><img src="img/beef.jpg" alt="beef"></li>
        <li><img src="img/carrot.jpg" alt="carrots"></li>
        <li><img src="img/chciken.jpg" alt="chicken"></li>
        <li><img src="img/rice.jpg" alt="rice"></li>
    </ul>
    <script src="jquery.js"></script>
    <script>
        let words = ['Carrots','Beef','Rice','Chicken'];
        $('span').html(words[0]);
        if(words.length != 0){
            $('img').click(function(){
                if(this.alt.toLowerCase() === words[0].toLowerCase()){
                    $(this).css("display","none");
                    words.shift();
                    $('span').html(words[0]);
                    if(words.length == 0){
                        $('h2').html("恭喜光盘");
                    }
                }
            });
        }
        
    </script>
</body>
</html>
